services:
  # 🌐 Frontend (Static Site)
  - type: web
    name: bny-form-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishPath: frontend/form/dist
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ⚙️ Backend (Spring Boot)
  - type: web
    name: bny-form-backend
    runtime: docker
    dockerContext: ./form
    dockerfilePath: ./form/dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_DATASOURCE_URL
        sync: false # Set this in the Render Dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
